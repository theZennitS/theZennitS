<svg xmlns="http://www.w3.org/2000/svg" width="280" height="40" viewBox="0 0 280 40">
  <defs>
    <style>
      @font-face {
        font-family: 'MinecraftBold';
        src: url(data:font/opentype;charset=utf-8;base64,) format('opentype');
        font-weight: bold;
        font-style: normal;
      }
      .badge-bg {
        fill: #1e1e1f;
        stroke: #3c3f41;
        stroke-width: 2;
        rx: 4;
      }
      .text-shadow {
        font-family: 'MinecraftBold', monospace;
        font-size: 16px;
        fill: #3f3f3f;
      }
      .text-main {
        font-family: 'MinecraftBold', monospace;
        font-size: 16px;
        fill: #ffffff;
      }
      .highlight {
        fill: #55ff55;
      }
    </style>
  </defs>
  
  <!-- Content (centered) -->
  <g transform="translate(140, 25)" text-anchor="middle">
    <!-- Shadow (Minecraft style text shadow is shifted 2px down and 2px right) -->
    <text x="2" y="2" class="text-shadow">DARK MODE <tspan fill="#153f15">RECOMMENDED</tspan></text>
    
    <!-- Main Text -->
    <text x="0" y="0" class="text-main">DARK MODE <tspan class="highlight">RECOMMENDED</tspan></text>
  </g>
</svg>
