name: Update Profile Stats

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  push:
    branches:
      - main
    paths-ignore:
      - 'assests/**'
  workflow_dispatch: # Allows manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run SVG Generation Script
        run: python scratch/build_stats_svg.py

      - name: Commit and Push Updated SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assests/images/stats_banner.svg assests/images/stats_banner_with_counter.svg
          # Only commit and push if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: automatically update profile stats SVGs"
            git push
          else
            echo "No changes in stats SVGs."
          fi
